<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f7;
        }

        .container{
            width:400px;
            margin:70px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#27ae60;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#219150;
        }

        p{
            text-align:center;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <form th:action="@{/register}" method="post">

        <input type="text"
               name="fullname"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email Address"
               required>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">Register</button>

    </form>

    <p>
        Already have an account?
        <a th:href="@{/login}">Login</a>
    </p>

    <p>
        <a th:href="@{/}">Back to Home</a>
    </p>

</div>

</body>
</html>
