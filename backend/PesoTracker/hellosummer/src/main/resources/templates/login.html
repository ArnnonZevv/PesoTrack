<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#ecf0f1;
    }

    .container{
      width:350px;
      margin:100px auto;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    h2{
      text-align:center;
      color:#2c3e50;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#3498db;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#2980b9;
    }

    p{
      text-align:center;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Login</h2>

  <form th:action="@{/login}" method="post">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">Login</button>

  </form>

  <p>
    Don't have an account?
    <a th:href="@{/register}">Register here</a>
  </p>

  <p>
    <a th:href="@{/}">Back to Home</a>
  </p>

</div>

</body>
</html>
