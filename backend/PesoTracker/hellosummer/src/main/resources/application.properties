spring.application.name=PesoTracker

# --- Database (Supabase Postgres) ---
# Values come from environment variables so the real credentials never
# get committed to GitHub. Set these in your shell (or IntelliJ Run
# Config) before starting the app. See README for exact commands.
spring.datasource.url=${DB_URL:jdbc:postgresql://db.jjlqmwdhphvhbqpanvyv.supabase.co:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# --- JWT ---
# Also from an env var — generate any long random string for local dev.
jwt.secret=${JWT_SECRET:change-this-to-a-long-random-256-bit-string-before-real-use}
jwt.expiration-ms=86400000
